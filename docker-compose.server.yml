services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.server
    container_name: telegram-retail-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.server
    container_name: telegram-retail-backend
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      NODE_ENV: production
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: telegram-retail-postgres
    profiles: ["selfhosted-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegram_retail}
      POSTGRES_USER: ${POSTGRES_USER:-telegram_retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.server}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  caddy_data:
  caddy_config:
  postgres_data:

